<svg class="root w-full h-auto" width="500" height="400" viewBox="0 0 500 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Like a one-time secret, this page has vanished." focusable="false">
  <style>
    .root{
      --ink:#631507;--ink-soft:#85200c;--brand:#dc4a22;--brand-2:#f0623a;
      --cream:#f7dec3;--peach:#f0c39e;--card:#fffdf9;--env:#f3d9bf;
      --accent:#23b5dd;--muted:#a08b7e;--line:#d9b9a0;
    }
    @media (prefers-color-scheme:dark){
      .root{
        --ink:#f7dec3;--ink-soft:#f0c39e;--brand:#f1623b;--brand-2:#f8855f;
        --cream:#2f2520;--peach:#5a3a2c;--card:#322822;--env:#3a2c24;
        --accent:#3cc6ec;--muted:#9b8a7e;--line:#574236;
      }
    }
    /* Bridge to Starlight's manual theme toggle (overrides OS preference when
       the SVG is inlined in the page). data-theme is always set concretely by
       Starlight, so these win over the prefers-color-scheme fallback above. */
    :root[data-theme='light'] .root,
    .root.force-light{
      --ink:#631507;--ink-soft:#85200c;--brand:#dc4a22;--brand-2:#f0623a;
      --cream:#f7dec3;--peach:#f0c39e;--card:#fffdf9;--env:#f3d9bf;
      --accent:#23b5dd;--muted:#a08b7e;--line:#d9b9a0;
    }
    :root[data-theme='dark'] .root,
    .root.force-dark{
      --ink:#f7dec3;--ink-soft:#f0c39e;--brand:#f1623b;--brand-2:#f8855f;
      --cream:#2f2520;--peach:#5a3a2c;--card:#322822;--env:#3a2c24;
      --accent:#3cc6ec;--muted:#9b8a7e;--line:#574236;
    }
    @keyframes ots-pulse{0%,100%{opacity:.45}50%{opacity:.85}}
    @keyframes ots-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes ots-rise{0%{transform:translateY(0) scale(1);opacity:.9}100%{transform:translateY(-32px) scale(.35);opacity:0}}
    .pulse{animation:ots-pulse 2.6s infinite ease-in-out}
    .float{animation:ots-float 5s infinite ease-in-out}
    .ember{animation:ots-rise 2.8s infinite ease-out}
    @media (prefers-reduced-motion:reduce){.pulse,.float,.ember{animation:none}}
  </style>

  <!-- soft panel -->
  <rect x="38" y="34" width="424" height="332" rx="18" fill="var(--peach)" opacity="0.10"/>

  <!-- 404 -->
  <text x="250" y="108" text-anchor="middle" font-family="'Zilla Slab',Georgia,serif" font-size="82" font-weight="700" fill="var(--brand)" letter-spacing="3">404</text>

  <!-- floating question marks -->
  <text x="356" y="176" font-family="'Zilla Slab',Georgia,serif" font-size="34" fill="var(--brand)" class="pulse">?</text>
  <text x="386" y="248" font-family="'Zilla Slab',Georgia,serif" font-size="22" fill="var(--brand)" class="pulse" style="animation-delay:.9s">?</text>

  <!-- envelope with a vanishing secret -->
  <g transform="translate(165,150)">
    <g class="float">
      <!-- opened flap behind the note -->
      <path d="M10 80 L81 34 L152 80 Z" fill="var(--env)" stroke="var(--ink-soft)" stroke-width="2" opacity="0.85" stroke-linejoin="round"/>

      <!-- the note (secret) with a burnt top edge -->
      <path d="M32 86 L32 26 Q39 16 46 24 Q53 32 60 23 Q67 15 74 24 Q81 33 88 23 Q95 15 102 24 Q109 32 116 24 Q123 16 130 24 L130 86 Z"
            fill="var(--card)" stroke="var(--ink-soft)" stroke-width="2.5" stroke-linejoin="round"/>
      <!-- ember glow along the burnt edge -->
      <path d="M32 26 Q39 16 46 24 Q53 32 60 23 Q67 15 74 24 Q81 33 88 23 Q95 15 102 24 Q109 32 116 24 Q123 16 130 24"
            fill="none" stroke="var(--brand)" stroke-width="3" stroke-linecap="round"/>
      <!-- vanishing lines of text -->
      <rect x="46" y="44" width="70" height="6" rx="3" fill="var(--line)" opacity="0.7"/>
      <rect x="46" y="57" width="54" height="6" rx="3" fill="var(--line)" opacity="0.55"/>
      <rect x="46" y="70" width="62" height="6" rx="3" fill="var(--line)" opacity="0.4"/>

      <!-- envelope body (front) -->
      <rect x="6" y="78" width="150" height="70" rx="8" fill="var(--env)" stroke="var(--ink-soft)" stroke-width="2.5"/>
      <path d="M8 82 L81 116 L154 82" fill="none" stroke="var(--ink-soft)" stroke-width="1.8" opacity="0.5"/>

      <!-- wax-seal padlock -->
      <g transform="translate(70,112)">
        <rect x="0" y="8" width="22" height="17" rx="3.5" fill="var(--brand)"/>
        <path d="M4 8 V4 a7 7 0 0 1 14 0 V8" fill="none" stroke="var(--brand)" stroke-width="3"/>
        <circle cx="11" cy="15" r="2.4" fill="var(--cream)"/>
        <rect x="9.8" y="15" width="2.4" height="6" rx="1.2" fill="var(--cream)"/>
      </g>

      <!-- embers drifting up from the burnt edge -->
      <circle class="ember" cx="56" cy="18" r="3" fill="var(--brand)"/>
      <circle class="ember" cx="78" cy="14" r="2.4" fill="var(--brand-2)" style="animation-delay:.6s"/>
      <circle class="ember" cx="98" cy="16" r="3.4" fill="var(--brand)" style="animation-delay:1.1s"/>
      <circle class="ember" cx="118" cy="13" r="2" fill="var(--brand-2)" style="animation-delay:1.6s"/>
      <circle class="ember" cx="135" cy="18" r="2.8" fill="var(--brand)" style="animation-delay:2.1s"/>
    </g>
  </g>

  <!-- magnifying glass -->
  <g class="float" style="animation-delay:.4s">
    <circle cx="96" cy="306" r="25" fill="none" stroke="var(--accent)" stroke-width="3.5"/>
    <line x1="114" y1="324" x2="134" y2="346" stroke="var(--accent)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- message -->
  <text x="250" y="350" text-anchor="middle" font-family="'Zilla Slab',Georgia,serif" font-size="17" fill="var(--ink)">Like a one-time secret, this page has vanished.</text>

  <!-- byline -->
  <text x="480" y="390" text-anchor="end" font-family="Arial,Helvetica,sans-serif" font-size="10" fill="var(--muted)">Crafted by Claude Opus 4.8 with minimal supervision</text>
</svg>
