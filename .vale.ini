# Vale configuration — prose linting for Onetime Secret documentation.
#
# Enforces the brand and product-tier terminology defined in
# src/content/docs/en/translations/universal/brand-terms.md.
#
# Rollout: starts report-only (non-blocking) in CI — see
# .github/workflows/vale.yml — so it surfaces issues without failing builds.
# Tighten MinAlertLevel / the workflow's fail_on_error once the backlog is clean.
#
# Run locally:  vale src/content/docs/en
StylesPath = styles

MinAlertLevel = suggestion

[*.md]
BasedOnStyles = OnetimeSecret
